<div class="staff-coding-create pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="brand m-0">Create Coding Challenge</h3>
            <div class="text-muted small mt-1">Design a new algorithmic challenge for students.</div>
        </div>
        <button class="btn btn-outline-secondary btn-sm px-3 shadow-sm" onclick="switchTab('tab-staff-question-bank')">
            <i class="fa-solid fa-arrow-left me-2"></i>Back to Bank
        </button>
    </div>

    <form id="createCodingForm" onsubmit="event.preventDefault(); StaffModule.saveCoding();">
        <div class="row g-4">
            <!-- Main Content Left Column -->
            <div class="col-md-8">
                <div class="lux-card p-4 mb-4">
                    <h5 class="brand border-bottom pb-2 mb-4">Challenge Details</h5>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Challenge Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light border-0" id="codingTitle" placeholder="e.g. Reverse a Linked List" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Problem Statement <span class="text-danger">*</span></label>
                        <textarea class="form-control bg-light border-0" id="codingStatement" rows="5" placeholder="Describe the problem, input format, and output format clearly..." required style="resize: none;"></textarea>
                    </div>
                    
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dark">Input Format <span class="text-danger">*</span></label>
                            <textarea class="form-control bg-light border-0" id="codingInputFormat" rows="2" placeholder="e.g. The first line contains an integer N..." required></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dark">Output Format <span class="text-danger">*</span></label>
                            <textarea class="form-control bg-light border-0" id="codingOutputFormat" rows="2" placeholder="e.g. Print a single integer representing..." required></textarea>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dark">Constraints</label>
                        <textarea class="form-control bg-light border-0" id="codingConstraints" rows="2" placeholder="e.g. 1 <= N <= 10^5"></textarea>
                    </div>
                </div>
                
                <div class="lux-card p-4 mb-4">
                    <h5 class="brand border-bottom pb-2 mb-4 d-flex justify-content-between align-items-center">
                        <span>Test Cases</span>
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="StaffModule.addTestCase()">
                            <i class="fa-solid fa-plus me-1"></i>Add Case
                        </button>
                    </h5>
                    
                    <div id="testCasesContainer">
                        <!-- Test cases injected by JS -->
                    </div>
                </div>
                
                <div class="lux-card p-4">
                    <h5 class="brand border-bottom pb-2 mb-4">Initial Code Stub</h5>
                    
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="stubLang" id="stubPy" autocomplete="off" checked onchange="StaffModule.changeStubLanguage('python')">
                            <label class="btn btn-outline-secondary btn-sm" for="stubPy"><i class="fa-brands fa-python text-info me-1"></i>Python</label>
                          
                            <input type="radio" class="btn-check" name="stubLang" id="stubJava" autocomplete="off" onchange="StaffModule.changeStubLanguage('java')">
                            <label class="btn btn-outline-secondary btn-sm" for="stubJava"><i class="fa-brands fa-java text-danger me-1"></i>Java</label>
                          
                            <input type="radio" class="btn-check" name="stubLang" id="stubCpp" autocomplete="off" onchange="StaffModule.changeStubLanguage('cpp')">
                            <label class="btn btn-outline-secondary btn-sm" for="stubCpp"><i class="fa-solid fa-c text-primary me-1"></i>C++</label>
                        </div>
                    </div>
                    
                    <!-- Ace Editor Container -->
                    <div id="stubEditor" style="height: 250px; width: 100%; border-radius: 8px; border: 1px solid #e2e8f0;"></div>
                </div>
                
            </div>
            
            <!-- Settings Right Column -->
            <div class="col-md-4">
                <div class="lux-card p-4 mb-4 position-sticky" style="top: 20px;">
                    <h6 class="fw-bold brand mb-3">Challenge Settings</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Category / Tag</label>
                        <select class="form-select border-0 bg-light" id="codingCategory">
                            <option value="Arrays">Arrays</option>
                            <option value="Strings">Strings</option>
                            <option value="Linked Lists">Linked Lists</option>
                            <option value="Trees">Trees</option>
                            <option value="Dynamic Programming">Dynamic Programming</option>
                            <option value="Graphs">Graphs</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Difficulty Level</label>
                        <select class="form-select border-0 bg-light" id="codingDifficulty">
                            <option value="Easy">Easy</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Points</label>
                        <input type="number" class="form-control border-0 bg-light" id="codingPoints" value="10" min="5" max="100">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-muted">Time Limit (Seconds)</label>
                        <input type="number" step="0.5" class="form-control border-0 bg-light" id="codingTimeLimit" value="2.0" min="0.5" max="10.0">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-semibold text-muted">Memory Limit (MB)</label>
                        <input type="number" class="form-control border-0 bg-light" id="codingMemLimit" value="256" min="64" max="1024">
                    </div>
                    
                    <hr class="my-4 text-muted">
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-2"></i>Publish Challenge</button>
                        <button type="button" class="btn btn-outline-secondary">Save as Draft</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
