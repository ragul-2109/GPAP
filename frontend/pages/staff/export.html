<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="brand m-0">Export Results & Reports</h4>
        <div class="text-muted" style="font-size: 0.9rem;">
            <i class="fa-solid fa-clock-rotate-left"></i> Last exported: Today, 10:45 AM
        </div>
    </div>
    
    <div class="export-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; max-width: 900px; margin: 0 auto;">
        <!-- Performance Report -->
        <div class="export-card">
            <div class="export-icon-wrapper">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <h5>Performance Report</h5>
            <p class="text-muted" style="font-size: 0.85rem;">Detailed scores, percentile rankings, and skill breakdown for all students.</p>
            
            <div class="export-form-group">
                <label>Date Range</label>
                <select id="export-date-range">
                    <option value="7">Last 7 Days</option>
                    <option value="30">Last 30 Days</option>
                    <option value="semester">This Semester</option>
                    <option value="all">All Time</option>
                </select>
            </div>
            
            <div class="export-btn-group">
                <button class="btn-export btn-export-csv" style="flex: 1;" onclick="ExportResults.downloadPerformanceReport()"><i class="fa-solid fa-file-csv"></i> Download CSV</button>
            </div>
        </div>

        <!-- Cheating Logs -->
        <div class="export-card">
            <div class="export-icon-wrapper">
                <i class="fa-solid fa-user-secret"></i>
            </div>
            <h5>AI Proctoring Logs</h5>
            <p class="text-muted" style="font-size: 0.85rem;">Tab switches, copy-paste attempts, and other suspicious activities detected.</p>
            
            <div class="export-form-group">
                <label>Risk Level</label>
                <select id="export-risk-level">
                    <option value="High Risk Only">High Risk Only</option>
                    <option value="Medium & High">Medium & High</option>
                    <option value="All Incidents">All Incidents</option>
                </select>
            </div>
            
            <div class="export-btn-group">
                <button class="btn-export btn-export-csv" style="flex: 1;" onclick="ExportResults.downloadProctoringLogs()"><i class="fa-solid fa-file-shield"></i> Generate Secure CSV Report</button>
            </div>
        </div>
    </div>
</div>
