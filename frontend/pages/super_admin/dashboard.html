<script>
    async function loadSuperAnalytics() {
        try {
            const res = await fetch('/api/analytics/super', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            if(res.ok) {
                const data = await res.json();
                
                document.getElementById('sa-total-colleges').innerText = data.overview.total_colleges;
                document.getElementById('sa-total-students').innerText = data.overview.total_students.toLocaleString();
                
                let mrr = data.overview.mrr / 1000;
                document.getElementById('sa-mrr').innerHTML = `$${mrr}<span style="font-size: 1.5rem;">k</span>`;
                
                document.getElementById('sa-uptime').innerHTML = `${data.overview.uptime}<span style="font-size: 1.5rem;">%</span>`;
                
                const alertsList = document.getElementById('sa-alerts-list');
                alertsList.innerHTML = '';
                
                const iconMap = {
                    'warning': '<i class="fa-solid fa-triangle-exclamation text-warning me-2"></i>',
                    'success': '<i class="fa-solid fa-building-circle-check text-success me-2"></i>',
                    'primary': '<i class="fa-solid fa-file-invoice-dollar text-primary me-2"></i>'
                };
                
                data.alerts.forEach(alert => {
                    alertsList.innerHTML += `
                        <div class="list-group-item bg-transparent px-0 border-bottom">
                            <div class="d-flex justify-content-between align-items-center">
                                <div style="font-weight: 600;">${iconMap[alert.type]} ${alert.title}</div>
                                <span class="text-muted" style="font-size: 0.75rem;">${alert.time}</span>
                            </div>
                            <div class="text-muted mt-1" style="font-size: 0.85rem;">${alert.desc}</div>
                        </div>
                    `;
                });
            }
        } catch(e) {
            console.error('Failed to load super admin analytics', e);
        }
    }
    
    async function exportSuperAdminReport() {
        try {
            const res = await fetch('/api/reports/export?export_type=platform_analytics', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            if(res.ok) {
                const data = await res.json();
                alert(data.message + "\nDownload link: " + data.download_url);
            }
        } catch (e) {
            alert('Export failed');
        }
    }

    loadSuperAnalytics();
</script>
