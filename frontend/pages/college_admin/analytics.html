<div>
    <div class="page-header-actions">
        <div>
            <h4 class="brand m-0">Performance Analytics</h4>
            <div class="text-muted" style="font-size: 0.9rem;">College-wide academic and placement readiness metrics.</div>
        </div>
        <div>
            <select class="form-select w-auto">
                <option>Current Batch (2025)</option>
                <option>Previous Batch (2024)</option>
            </select>
        </div>
    </div>

    <!-- Advanced Analytics Filters -->
    <div class="lux-card p-3 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label text-muted small fw-bold">Department</label>
                <select class="form-select" id="analyticsDeptFilter">
                    <option value="">All Departments</option>
                    <option value="CSE">Computer Science</option>
                    <option value="IT">Information Technology</option>
                    <option value="ECE">Electronics</option>
                    <option value="MECH">Mechanical</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label text-muted small fw-bold">Section</label>
                <select class="form-select" id="analyticsSectionFilter">
                    <option value="">All Sections</option>
                    <option value="A">Section A</option>
                    <option value="B">Section B</option>
                    <option value="C">Section C</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label text-muted small fw-bold">Test Date Range</label>
                <input type="date" class="form-control" id="analyticsDateFilter">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="AnalyticsManager.applyFilters()"><i class="fa-solid fa-filter me-1"></i> View Results</button>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="lux-card p-4 text-center">
                <div class="text-muted mb-2 font-weight-bold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Avg Institution Score</div>
                <h2 class="brand m-0" id="avgInstitutionScore" style="font-size: 3rem; color: var(--primary-color);">68<span style="font-size:1.5rem;">%</span></h2>
                <div class="text-success mt-2" id="avgScoreTrend" style="font-size: 0.85rem;"><i class="fa-solid fa-arrow-trend-up"></i> +4% from last semester</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="lux-card p-4 text-center">
                <div class="text-muted mb-2 font-weight-bold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Tests Conducted</div>
                <h2 class="brand m-0" style="font-size: 3rem; color: #8b5cf6;">14</h2>
                <div class="text-muted mt-2" style="font-size: 0.85rem;">This academic year</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="lux-card p-4 text-center">
                <div class="text-muted mb-2 font-weight-bold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Placement Eligible</div>
                <h2 class="brand m-0" style="font-size: 3rem; color: #10b981;">340</h2>
                <div class="text-muted mt-2" style="font-size: 0.85rem;">Out of 1,250 total students</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="lux-card p-4 h-100">
                <h5 class="mb-4">Department Performance Comparison</h5>
                <div class="d-flex align-items-center mb-3">
                    <div style="width: 100px; font-weight: 600; font-size: 0.85rem;">CSE</div>
                    <div class="flex-grow-1 mx-3" style="height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden;">
                        <div style="width: 78%; height: 100%; background: var(--primary-color);"></div>
                    </div>
                    <div style="width: 40px; font-weight: bold; text-align: right;">78%</div>
                </div>
                <div class="d-flex align-items-center mb-3">
                    <div style="width: 100px; font-weight: 600; font-size: 0.85rem;">ECE</div>
                    <div class="flex-grow-1 mx-3" style="height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden;">
                        <div style="width: 65%; height: 100%; background: #10b981;"></div>
                    </div>
                    <div style="width: 40px; font-weight: bold; text-align: right;">65%</div>
                </div>
                <div class="d-flex align-items-center mb-3">
                    <div style="width: 100px; font-weight: 600; font-size: 0.85rem;">IT</div>
                    <div class="flex-grow-1 mx-3" style="height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden;">
                        <div style="width: 72%; height: 100%; background: #8b5cf6;"></div>
                    </div>
                    <div style="width: 40px; font-weight: bold; text-align: right;">72%</div>
                </div>
                <div class="d-flex align-items-center mb-3">
                    <div style="width: 100px; font-weight: 600; font-size: 0.85rem;">MECH</div>
                    <div class="flex-grow-1 mx-3" style="height: 12px; background: #e2e8f0; border-radius: 6px; overflow: hidden;">
                        <div style="width: 54%; height: 100%; background: #f59e0b;"></div>
                    </div>
                    <div style="width: 40px; font-weight: bold; text-align: right;">54%</div>
                </div>
            </div>
        </div>
    </div>
</div>
